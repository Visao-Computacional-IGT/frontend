<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconhecimento Facial - IGT Grêmio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container" id="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>GRÊMIO - IGT</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard Geral</li>
                <li class="nav-item" onclick="window.location.href='cadastrar-alunos.html'"><i class="fas fa-users"></i> Cadastrar Alunos</li>
                <li class="nav-item" onclick="window.location.href='alunos.html'"><i class="fas fa-user-graduate"></i> Alunos</li>
                <li class="nav-item" onclick="window.location.href='chamada.html'"><i class="fas fa-clipboard-list"></i> Chamada</li>
                <li class="nav-item" onclick="window.location.href='camera.html'"><i class="fas fa-camera"></i> Facial (Python)</li>
                <li class="nav-item" onclick="window.location.href='calendario.html'"><i class="fas fa-calendar-alt"></i> Calendário</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">Reconhecimento Facial</h2>
                <div class="header-controls">
                    <button class="logout-btn" onclick="window.location.href='../index.html'" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page active">
                <div class="card">
                    <div class="card-header border-bottom pb-3">
                        <h3 class="card-title m-0"><i class="fas fa-video text-primary"></i> Sistema de Catraca/Câmera</h3>
                        <p class="text-muted text-small mt-2">Aguardando integração com script Python via WebSocket/API.</p>
                    </div>

                    <div class="camera-container camera-grid mt-4">
                        <div class="camera-feed-section">
                            <div class="video-wrapper position-relative">
                                <video id="video-feed" autoplay playsinline class="w-100 h-100 object-cover"></video>
                                <div class="scan-line d-none" id="scan-line"></div>
                                <div id="camera-status" class="camera-status-overlay text-center text-white">
                                    <i class="fas fa-camera-slash icon-xl mb-2"></i>
                                    <p>Câmera Desligada</p>
                                </div>
                            </div>
                            <div class="controls action-buttons d-flex gap-10 mt-3">
                                <button class="btn btn-primary btn-flex flex-1 p-2" id="btn-iniciar">
                                    <i class="fas fa-play"></i> Ligar Câmera
                                </button>
                                <button class="btn btn-dark btn-flex flex-1 p-2" id="btn-parar">
                                    <i class="fas fa-stop"></i> Desligar
                                </button>
                            </div>
                        </div>

                        <div class="recognition-section">
                            <h4 class="section-title text-dark-blue mb-3">Alunos Reconhecidos Hoje</h4>
                            <div class="recognition-log log-container bg-white border-rounded p-3 max-h-400 overflow-y-auto" id="log-container">
                                <p class="empty-state text-center text-muted mt-4" id="empty-log">Nenhum aluno detectado ainda.</p>
                            </div>
                            <button class="btn btn-success btn-full mt-3 p-2">
                                <i class="fas fa-check-double"></i> Confirmar Presenças
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const videoElement = document.getElementById('video-feed');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnParar = document.getElementById('btn-parar');
        const statusText = document.getElementById('camera-status');
        const scanLine = document.getElementById('scan-line');
        const logContainer = document.getElementById('log-container');
        const emptyLog = document.getElementById('empty-log');
        let streamData = null, simuladorTimer = null;

        const alunosMock = [
            { nome: 'João Silva', matricula: '2026001', hora: '08:05' },
            { nome: 'Ana Souza', matricula: '2026004', hora: '08:06' },
            { nome: 'Lucas Mendes', matricula: '2026006', hora: '08:12' }
        ];

        btnIniciar.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = stream;
                streamData = stream;
                statusText.style.display = 'none';
                scanLine.style.display = 'block';
                iniciarSimulacaoReconhecimento();
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                alert("Não foi possível acessar a câmera do dispositivo.");
            }
        });

        btnParar.addEventListener('click', () => {
            if (streamData) {
                streamData.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
                statusText.style.display = 'block';
                scanLine.style.display = 'none';
                clearInterval(simuladorTimer);
            }
        });

        function iniciarSimulacaoReconhecimento() {
            let index = 0;
            simuladorTimer = setInterval(() => {
                if (index < alunosMock.length) {
                    if (emptyLog) emptyLog.style.display = 'none';
                    const aluno = alunosMock[index];
                    const logItem = document.createElement('div');
                    logItem.className = 'log-item d-flex align-center gap-10 p-2 border-bottom';
                    const iniciais = aluno.nome.split(' ').map(n => n[0]).join('').substring(0,2);

                    logItem.innerHTML = `
                        <div class="log-avatar">${iniciais}</div>
                        <div class="log-info">
                            <strong class="text-dark">${aluno.nome}</strong>
                            <span class="text-small text-muted">Matrícula: ${aluno.matricula} | <i class="far fa-clock"></i> ${new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</span>
                        </div>
                        <div class="ms-auto text-success">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    `;
                    logContainer.prepend(logItem);
                    index++;
                } else {
                    clearInterval(simuladorTimer);
                }
            }, 4000);
        }
    </script>
</body>
</html>
