<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Fotos - IGT Grêmio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container" id="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>GRÊMIO - IGT</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard Geral</li>
                <li class="nav-item" onclick="window.location.href='professores.html'"><i class="fas fa-chalkboard-teacher"></i> Gerenciar Professores</li>
                <li class="nav-item" onclick="window.location.href='cadastrar-alunos.html'"><i class="fas fa-users"></i> Cadastrar Alunos</li>
                <li class="nav-item" onclick="window.location.href='alunos.html'"><i class="fas fa-user-graduate"></i> Alunos</li>
                <li class="nav-item" onclick="window.location.href='chamada.html'"><i class="fas fa-clipboard-list"></i> Chamada</li>
                <li class="nav-item" onclick="window.location.href='camera.html'"><i class="fas fa-camera"></i> Facial</li>
                <li class="nav-item" onclick="window.location.href='calendario.html'"><i class="fas fa-calendar-alt"></i> Calendário</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">Gestão de Fotos</h2>
                <div class="header-controls">
                    <button class="logout-btn" onclick="window.location.href='../index.html'" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page active">
                <div class="card card-centered max-w-600 m-auto">
                    <div class="card-header border-bottom pb-3 mb-4">
                        <h3 class="card-title m-0"><i class="fas fa-id-badge text-primary"></i> Vincular Foto ao Aluno</h3>
                    </div>

                    <div class="form-group mb-3">
                        <label for="select-aluno" class="form-label">Selecione o Aluno:</label>
                        <select id="select-aluno" class="form-control form-select-large">
                            <option value="">-- Escolha um aluno --</option>
                            <option value="2026001">2026001</option>
                            <option value="2026002">2026002</option>
                            <option value="2026004">2026004</option>
                            <option value="2026006">2026006</option>
                        </select>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Foto do Rosto (Formato JPG ou PNG):</label>
                        <div class="upload-area text-center bg-light border-dashed p-4 cursor-pointer" id="drop-zone">
                            <i class="fas fa-file-image icon-xxl text-primary mb-3"></i>
                            <h4 class="text-dark m-0">Clique aqui ou arraste a foto</h4>
                            <p class="text-muted text-small mt-2">Tamanho máximo: 5MB</p>
                            <input type="file" id="foto-input" class="d-none" accept="image/png, image/jpeg">
                        </div>
                    </div>

                    <div class="preview-container d-none flex-column align-center mt-4" id="preview-container">
                        <h4 class="preview-title text-muted mb-2">Pré-visualização:</h4>
                        <img src="" alt="Preview" class="preview-image border-primary shadow-sm rounded object-cover max-w-200" id="img-preview">
                        <button class="btn btn-link text-error mt-2 text-underline" id="btn-remover-foto"><i class="fas fa-trash"></i> Remover Imagem</button>
                    </div>

                    <div class="card-footer align-right border-top mt-4 pt-4 text-right">
                        <button class="btn btn-primary btn-auto px-4" id="btn-salvar-foto">
                            <i class="fas fa-cloud-upload-alt"></i> Salvar Foto no Sistema
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fotoInput = document.getElementById('foto-input');
            const dropZone = document.getElementById('drop-zone');
            const previewContainer = document.getElementById('preview-container');
            const imgPreview = document.getElementById('img-preview');
            const btnRemover = document.getElementById('btn-remover-foto');
            const btnSalvar = document.getElementById('btn-salvar-foto');
            const selectAluno = document.getElementById('select-aluno');

            dropZone.addEventListener('click', () => fotoInput.click());

            fotoInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imgPreview.src = e.target.result;
                        previewContainer.classList.remove('d-none');
                        previewContainer.classList.add('d-flex');
                        dropZone.classList.add('d-none');
                    }
                    reader.readAsDataURL(file);
                }
            });

            btnRemover.addEventListener('click', () => {
                fotoInput.value = '';
                imgPreview.src = '';
                previewContainer.classList.add('d-none');
                previewContainer.classList.remove('d-flex');
                dropZone.classList.remove('d-none');
            });

            btnSalvar.addEventListener('click', () => {
                if (!selectAluno.value) return alert('Por favor, selecione um aluno primeiro!');
                if (!fotoInput.files[0]) return alert('Por favor, envie uma foto!');
                alert(`Sucesso! A foto foi vinculada à matrícula ${selectAluno.value}.`);
                selectAluno.value = '';
                btnRemover.click();
            });
        });
    </script>
</body>
</html>
