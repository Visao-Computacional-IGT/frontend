<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - IGT Grêmio</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container" id="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>GRÊMIO - IGT</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard Geral</li>
                <li class="nav-item" onclick="window.location.href='professores.html'"><i class="fas fa-chalkboard-teacher"></i> Gerenciar Professores</li>
                <li class="nav-item" onclick="window.location.href='cadastrar-alunos.html'"><i class="fas fa-users"></i> Cadastrar Alunos</li>
                <li class="nav-item" onclick="window.location.href='alunos.html'"><i class="fas fa-user-graduate"></i> Alunos</li>
                <li class="nav-item" onclick="window.location.href='chamada.html'"><i class="fas fa-clipboard-list"></i> Chamada</li>
                <li class="nav-item" onclick="window.location.href='camera.html'"><i class="fas fa-camera"></i> Facial</li>
                <li class="nav-item" onclick="window.location.href='calendario.html'"><i class="fas fa-calendar-alt"></i> Calendário</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">Dashboard Geral</h2>
                <div class="header-controls">
                    <span class="timestamp" id="timestamp"></span>
                    <div class="user-info">
                        <div class="user-avatar">IGT</div>
                        <span>Admin</span>
                    </div>
                    <button class="logout-btn" onclick="window.location.href='../index.html'" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page active" id="dashboard">
                <div class="kpi-container">
                    <div class="kpi-card" id="kpi-ebats-card">
                        <div class="kpi-title">Total de Alunos</div>
                        <div class="kpi-value" id="kpi-ebats">0</div>
                    </div>
                    <div class="kpi-card" id="kpi-dados-card">
                        <div class="kpi-title">Média de Presença Geral</div>
                        <div class="kpi-value" id="kpi-dados-percent">0%</div>
                    </div>
                    <div class="kpi-card" id="kpi-ebats-card">
                        <div class="kpi-title">Aptos Para Cesta Básica</div>
                        <div class="kpi-value" id="kpi-ebats">0</div>
                    </div>
                    <div class="kpi-card alert-kpi" id="kpi-alertas-card">
                        <div class="kpi-title">Alertas</div>
                        <div class="kpi-value" id="kpi-alertas">0</div>
                    </div>
                </div>

                <div class="card dashboard-calendar-card">
                    <div class="card-header border-bottom pb-3 mb-3 d-flex justify-between align-center flex-wrap gap-15">
                        <h4 class="card-title m-0"><i class="fas fa-calendar-alt text-primary"></i> Agenda do Projeto</h4>
                        
                        <div class="calendar-controls d-flex align-center gap-10">
                            <button class="btn btn-secondary btn-small px-2" id="btn-prev-month" title="Mês Anterior">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            
                            <select id="select-month" class="form-control" style="width: auto; padding: 5px 10px;"></select>
                            <select id="select-year" class="form-control" style="width: auto; padding: 5px 10px;"></select>

                            <button class="btn btn-secondary btn-small px-2" id="btn-next-month" title="Próximo Mês">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="calendar-container" class="calendar-grid"></div>

                    <div class="legend-container border-top mt-3 pt-2 d-flex gap-15 align-center text-small">
                        <span class="legend-item d-flex align-center gap-5"><div class="legend-color legend-border bg-primary border-rounded-sm"></div> Jogos (Sem Atendimento)</span>
                        <span class="legend-item d-flex align-center gap-5"><div class="legend-color bg-success border-rounded-sm"></div> Atividade Social</span>
                    </div>
                </div>

                </div>
            </div>
        </main>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
