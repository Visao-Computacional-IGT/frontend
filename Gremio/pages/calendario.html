<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Anual - IGT Grêmio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container" id="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>GRÊMIO - IGT</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard Geral</li>
                <li class="nav-item" onclick="window.location.href='cadastrar-alunos.html'"><i class="fas fa-users"></i> Cadastrar Alunos</li>
                <li class="nav-item" onclick="window.location.href='alunos.html'"><i class="fas fa-user-graduate"></i> Alunos</li>
                <li class="nav-item" onclick="window.location.href='chamada.html'"><i class="fas fa-clipboard-list"></i> Chamada</li>
                <li class="nav-item" onclick="window.location.href='camera.html'"><i class="fas fa-camera"></i> Facial (Python)</li>
                <li class="nav-item" onclick="window.location.href='calendario.html'"><i class="fas fa-calendar-alt"></i> Calendário</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">Agenda Anual do Projeto</h2>
                <div class="header-controls">
                    <div class="user-info">
                        <div class="user-avatar">IGT</div>
                        <span>Admin</span>
                    </div>
                    <button class="logout-btn" onclick="window.location.href='../index.html'" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page active" id="calendario-page">
                <div class="card card-border-top">
                    <div class="card-header border-bottom pb-3 mb-4 d-flex justify-between align-center flex-wrap gap-15">
                        <h3 class="card-title m-0"><i class="fas fa-calendar-alt text-primary"></i> Calendário 2026</h3>
                        
                        <div class="header-actions d-flex align-center flex-wrap gap-15">
                            <div class="legend-box bg-light border-rounded p-2 d-flex gap-15 align-center text-small">
                                <span class="legend-item d-flex align-center gap-5 text-medium">
                                    <div class="legend-color bg-primary border-rounded-sm"></div> Jogos
                                </span>
                                <span class="legend-item d-flex align-center gap-5 text-medium">
                                    <div class="legend-color bg-success border-rounded-sm"></div> Social
                                </span>
                                <span class="legend-item d-flex align-center gap-5 text-medium">
                                    <div class="legend-color bg-warning border-rounded-sm"></div> Reuniões
                                </span>
                            </div>
                            <button class="btn btn-primary btn-auto d-flex align-center gap-5 m-0" id="btn-novo-evento">
                                <i class="fas fa-plus"></i> Novo Evento
                            </button>
                        </div>
                    </div>

                    <div id="calendario-anual-container" class="year-calendar-grid mt-3">
                        <div class="loading-state text-center text-muted p-4">
                            <i class="fas fa-spinner fa-spin icon-xl mb-2"></i>
                            <p>Carregando eventos do calendário...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
