<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Alunos - IGT Grêmio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container" id="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>GRÊMIO - IGT</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard Geral</li>
                <li class="nav-item" onclick="window.location.href='cadastrar-alunos.html'"><i class="fas fa-users"></i> Cadastrar Alunos</li>
                <li class="nav-item" onclick="window.location.href='alunos.html'"><i class="fas fa-user-graduate"></i> Alunos</li>
                <li class="nav-item" onclick="window.location.href='chamada.html'"><i class="fas fa-clipboard-list"></i> Chamada</li>
                <li class="nav-item" onclick="window.location.href='camera.html'"><i class="fas fa-camera"></i> Facial (Python)</li>
                <li class="nav-item" onclick="window.location.href='calendario.html'"><i class="fas fa-calendar-alt"></i> Calendário</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">Gestão de Alunos</h2>
                <div class="header-controls">
                    <div class="user-info">
                        <div class="user-avatar">IGT</div>
                        <span>Admin</span>
                    </div>
                    <button class="logout-btn" onclick="window.location.href='../index.html'" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page active" id="cadastro-page">
                <div class="card" id="form-cadastro-card">
                    <div class="card-header">
                        <h3 class="card-title m-0"><i class="fas fa-user-plus text-primary"></i> Novo Cadastro de Aluno</h3>
                    </div>
                    
                    <div class="form-wrapper">
                        <h4 class="section-title">Dados Pessoais</h4>
                        <div class="form-group">
                            <label class="form-label">Matrícula</label>
                            <input type="text" id="cad-matricula" class="form-control" placeholder="Ex: 2026008">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" id="cad-nome" class="form-control" placeholder="Nome completo do aluno">
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label">Data de Nascimento</label>
                                <input type="date" id="cad-nascimento" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">CPF</label>
                                <input type="text" id="cad-cpf" class="form-control" placeholder="000.000.000-00">
                            </div>
                        </div>

                        <h4 class="section-title">Contato e Endereço</h4>
                        <div class="form-group">
                            <label class="form-label">Nome dos Pais / Responsáveis</label>
                            <input type="text" id="cad-pais" class="form-control" placeholder="Nome da mãe e/ou do pai">
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label">Telefone (WhatsApp)</label>
                                <input type="tel" id="cad-telefone" class="form-control" placeholder="(00) 00000-0000">
                            </div>
                            <div class="form-group">
                                <label class="form-label">E-mail</label>
                                <input type="email" id="cad-email" class="form-control" placeholder="aluno@email.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Endereço Residencial</label>
                            <input type="text" id="cad-endereco" class="form-control" placeholder="Rua, número, bairro e cidade">
                        </div>

                        <h4 class="section-title">Dados Escolares e Saúde</h4>
                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label">Turma</label>
                                <select id="cad-turma" class="form-control">
                                    <option value="1º Ano A">1º Ano A</option>
                                    <option value="1º Ano B">1º Ano B</option>
                                    <option value="2º Ano A">2º Ano A</option>
                                    <option value="3º Ano A">3º Ano A</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Perfil no Grêmio</label>
                                <select id="cad-perfil" class="form-control">
                                    <option value="Aluno">Aluno(a) Comum</option>
                                    <option value="Representante">Representante de Turma</option>
                                    <option value="Diretoria">Membro da Diretoria</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select id="cad-status" class="form-control">
                                    <option value="Ativo">Ativo</option>
                                    <option value="Inativo">Inativo</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Tipo Sanguíneo</label>
                                <select id="cad-sangue" class="form-control">
                                    <option value="Nao Informado">Não Informado</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Observações Médicas / Gerais</label>
                            <textarea id="cad-observacoes" class="form-control textarea-resize" placeholder="Alergias, restrições médicas..." rows="2"></textarea>
                        </div>

                        <div class="info-box bg-light border-rounded p-3 mt-2">
                            <label class="consent-label d-flex gap-10">
                                <input type="checkbox" id="cad-lgpd" class="consent-checkbox">
                                <span class="text-small text-dark">Autorizo a coleta e o uso da imagem do aluno estritamente para fins de <strong>reconhecimento facial e segurança</strong>.</span>
                            </label>
                            <button type="button" class="btn btn-secondary btn-full mt-2" onclick="window.location.href='upload-fotos.html'">
                                <i class="fas fa-cloud-upload-alt"></i> Ir para Upload de Fotos
                            </button>
                        </div>

                        <button class="btn btn-primary btn-full mt-3" id="btn-salvar-aluno">
                            <i class="fas fa-save"></i> Salvar Cadastro do Aluno
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
