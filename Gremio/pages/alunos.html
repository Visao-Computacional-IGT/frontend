<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - IGT Grêmio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container" id="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>GRÊMIO - IGT</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard Geral</li>
                <li class="nav-item" onclick="window.location.href='cadastrar-alunos.html'"><i class="fas fa-users"></i> Cadastrar Alunos</li>
                <li class="nav-item" onclick="window.location.href='alunos.html'"><i class="fas fa-user-graduate"></i> Alunos</li>
                <li class="nav-item" onclick="window.location.href='chamada.html'"><i class="fas fa-clipboard-list"></i> Chamada</li>
                <li class="nav-item" onclick="window.location.href='camera.html'"><i class="fas fa-camera"></i> Facial (Python)</li>
                <li class="nav-item" onclick="window.location.href='calendario.html'"><i class="fas fa-calendar-alt"></i> Calendário</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">Gestão de Alunos</h2>
                <div class="header-controls">
                    <div class="user-info">
                        <div class="user-avatar">IGT</div>
                        <span>Admin</span>
                    </div>
                    <button class="logout-btn" onclick="window.location.href='../index.html'" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page active" id="alunos-page">
                <div class="card">
                    <div class="card-header border-bottom pb-3 mb-3 d-flex justify-between align-center flex-wrap gap-15">
                        <h3 class="card-title m-0"><i class="fas fa-list text-primary"></i> Lista de Alunos</h3>
                        
                        <div class="filter-wrapper d-flex flex-wrap align-center gap-15">
                            <div class="filter-group d-flex align-center gap-10">
                                <label for="filtro-turma" class="filter-label m-0">Turma:</label>
                                <select id="filtro-turma" class="filter-select form-control">
                                    <option value="todas">Todas as Turmas</option>
                                    <option value="1º Ano A">1º Ano A</option>
                                    <option value="1º Ano B">1º Ano B</option>
                                </select>
                            </div>
                            <div class="vertical-divider"></div>
                            <div class="filter-controls" id="status-filter-buttons">
                                 <button class="btn-filter active" data-status="all">Todos</button>
                                 <button class="btn-filter" data-status="ativo">Ativos</button>
                                 <button class="btn-filter" data-status="inativo">Inativos</button>
                            </div>
                        </div>
                        
                        <div class="header-actions flex-row-end d-flex gap-10">
                            <div class="search-container">
                                <i class="fas fa-search"></i>
                                <input type="text" id="search-input" class="form-control" placeholder="Buscar por nome...">
                            </div>
                            <button class="btn btn-primary btn-auto" id="btn-novo-aluno" onclick="window.location.href='cadastrar-alunos.html'">
                                <i class="fas fa-user-plus"></i> Novo Aluno
                            </button>
                        </div>
                    </div>
                    
                    <div class="summary-stats mb-3 text-muted text-small">
                        <span id="total-alunos-lista">Mostrando resultados da listagem.</span>
                    </div>

                    <div class="table-container">
                        <table class="data-table w-100">
                            <thead id="analise-thead">
                                <tr>
                                    <th data-sort="matricula" class="cursor-pointer">Matrícula <i class="fas fa-sort"></i></th>
                                    <th data-sort="nome" class="cursor-pointer">Nome do Aluno <i class="fas fa-sort"></i></th>
                                    <th data-sort="turma" class="cursor-pointer">Turma <i class="fas fa-sort"></i></th>
                                    <th data-sort="perfil" class="cursor-pointer">Perfil <i class="fas fa-sort"></i></th>
                                    <th data-sort="status" class="cursor-pointer">Status <i class="fas fa-sort"></i></th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="analise-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div> 
        </main>
    </div>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
